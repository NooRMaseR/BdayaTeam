
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=6r/m;

upstream nextjs_cluster {
    server nextjs:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;
    return 301 https://$server_name$request_uri; # redirect to https
}

server {
    listen 80 default_server;
    listen 443 ssl default_server;
    http2 on;
    server_name localhost 127.0.0.1;
    server_tokens off;
    client_max_body_size 300M;
    client_body_buffer_size 20M;
    
    proxy_buffering on;
    proxy_buffers 10 16k;
    proxy_buffer_size 8k;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 2h;
    ssl_certificate /etc/nginx/ssl/localhost.pem;
    ssl_certificate_key /etc/nginx/ssl/localhost-key.pem;
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location = /sw.js {
        proxy_pass http://nextjs_cluster; 
        proxy_http_version 1.1;
        
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # --- server static files ---
    location /api/static/ {
        alias /app/static_files/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- server public media files ---
    location ^~ /api/media/public/ {
        alias /app/media_files/public/;
        expires 3d;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        access_log off;
    }

    # --- server private media files ---
    location ^~ /api/media/protected/ {
        internal;
        alias /app/media_files/protected/;
    }

    # --- server daphne websocket ---
    location /ws/ {
        proxy_pass http://daphne:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /api/login/ {
        proxy_pass http://bolt:8000/api/login/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=auth_limit burst=10 nodelay;
	
        proxy_buffering on;
        proxy_buffers 10 16k;
        proxy_buffer_size 8k;
        proxy_redirect off;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
    }
    
    location /api/register/ {
        proxy_pass http://bolt:8000/api/register/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=auth_limit burst=10 nodelay;
	
        proxy_buffering on;
        proxy_buffers 10 16k;
        proxy_buffer_size 8k;
        proxy_redirect off;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
    }

    location /api/ {
        proxy_pass http://bolt:8000/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
	
        proxy_buffering on;
        proxy_buffers 10 16k;
        proxy_buffer_size 8k;
        proxy_redirect off;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
    }

    # --- server NextJS ---
    location / {
        proxy_pass http://nextjs_cluster;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_connect_timeout 30s;
        proxy_buffering on;
        proxy_buffers 10 16k;
        proxy_buffer_size 8k;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- NextJS static (Production only) ---
    location /_next/static/ {
        alias /usr/share/nginx/nextjs_static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
