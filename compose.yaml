services:
  # Self Kernel
  host-kernel-setup:
    image: alpine
    privileged: true
    command: sysctl -w vm.overcommit_memory=1

  # The Database (postgreSql)
  db:
    image: postgres:18.3
    restart: always
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql/
    expose:
      - "5432"
    env_file:
      - ./backend/.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The Cache (redis)
  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    depends_on:
      host-kernel-setup:
        condition: service_completed_successfully

  # The Backend (Django/Bolt)
  bolt:
    build:
      context: ./backend
    # command: ["uv", "run", "--no-dev", "manage.py", "runbolt", "--dev"] #! Dev Only
    image: bdayateam/backend:latest
    env_file:
      - ./backend/.env
    volumes:
      - backend_media:/app/media_files
      - ./backend/backups:/app/backups
      - /app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - backups/
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Huey Worker
  huey:
    image: bdayateam/backend:latest
    restart: always
    env_file:
      - ./backend/.env
    command: ["uv", "run", "--no-dev", "manage.py", "run_huey"]
    volumes:
      - ./backend/backups:/app/backups
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - backups/
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # websocket (daphne)
  daphne:
    image: bdayateam/backend:latest
    restart: always
    env_file:
      - ./backend/.env
    command: ["uv", "run", "--no-dev", "daphne", "-b", "0.0.0.0", "-p", "8001", "BdayaTeam.asgi:application"]
    deploy:
      resources:
        limits:
          memory: 200m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # The Frontend (Next.js)
  nextjs:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MEDIA_URL: ${NEXT_PUBLIC_MEDIA_URL}
        NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
        NEXT_API_URL: "https://nginx"
    # command: ["bun", "run", "dev"] #! Dev only
    image: bdayateam/frontend:latest
    env_file:
      - ./frontend/.env
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - /app/node_modules
      # - nextjs_static:/app/.next/static
      - nextjs_static:/app/_static
    develop:
      watch:
        - action: sync
          path: ./frontend/app
          target: /app
        - action: rebuild
          path: ./frontend/.env
        - action: rebuild
          path: ./frontend/package.json
    depends_on:
      bolt:
        condition: service_started

  # The Reverse Proxy (Nginx)
  nginx:
    image: nginx:alpine
    restart: always
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx_main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_teamBdaya_docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/localhost-key.pem:/etc/nginx/ssl/localhost-key.pem:ro
      - ./backend/localhost.pem:/etc/nginx/ssl/localhost.pem:ro
      - ./backend/static_files:/app/static_files:ro
      - backend_media:/app/media_files:ro
      - nextjs_static:/usr/share/nginx/nextjs_static:ro
    depends_on:
      bolt:
        condition: service_started
      nextjs:
        condition: service_started
  
  # The Restarter service (for refreshing the Memory (RAM))
  restarter:
    image: docker:cli
    restart: always
    environment:
      - TZ=Africa/Cairo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command: 
      - |
        # 1. Install tzdata and forcefully overwrite the container's core clock
        apk add --no-cache tzdata
        cp /usr/share/zoneinfo/Africa/Cairo /etc/localtime
        echo "Africa/Cairo" > /etc/timezone
        
        while true; do
          # The date command will now physically be unable to print UTC
          echo "Container current time is: $$(date)"
          
          # Set this to a few minutes from now to test!
          target=$$(date -d "04:30" +%s)
          now=$$(date +%s)
          
          diff=$$((target - now))
          
          if [ $$diff -le 0 ]; then
            diff=$$((diff + 86400))
          fi
          
          echo "Sleeping for $$diff seconds until the next trigger..."
          sleep $$diff
          
          echo "Executing restart command..."
          docker restart bdayateam-huey-1 bdayateam-bolt-1 bdayateam-daphne-1
          
          sleep 60
        done

volumes:
  db-data:
  nextjs_static:
  backend_media:
